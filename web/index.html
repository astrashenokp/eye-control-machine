<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eye-control-machine — 3D model</title>
  <!-- ?v=N cache-busts GitHub Pages' CDN -- bump on every css/js edit -->
  <link rel="stylesheet" href="css/style.css?v=3" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
      }
    }
  </script>
</head>
<body>
  <div id="app">
    <div id="face-cam">
      <div id="face-cam-inner">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="face-overlay"></canvas>
      </div>
      <div id="face-cam-label">скан обличчя</div>
    </div>

    <div id="divider"></div>

    <div id="scene-container">
      <div id="hud">
        <div id="hud-line1">gaze_x=-- gaze_y=--</div>
        <div id="hud-line2">command: --</div>
      </div>
    </div>
  </div>

  <button id="start-btn">Увімкнути камеру й керування очима</button>

  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
